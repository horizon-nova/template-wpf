name: 同步模板文件

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
  schedule:
    - cron: "0 18 * * *"

permissions:
  contents: write

jobs:
  sync-template-files:
    runs-on: ubuntu-latest
    env:
      SOURCE_TEMPLATE_REPOSITORY: https://github.com/Horizon-Nova/template-wpf.git
      SOURCE_TEMPLATE_BRANCH: main

    steps:
      - name: 取得目前專案內容
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 設定 Git 身分
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: 下載來源模板
        run: |
          git clone --depth 1 --branch "${SOURCE_TEMPLATE_BRANCH}" "${SOURCE_TEMPLATE_REPOSITORY}" "${RUNNER_TEMP}/template-source"

      - name: 同步標準文件與工作流程
        run: |
          mkdir -p docs .github/workflows
          rsync -av --delete "${RUNNER_TEMP}/template-source/docs/" docs/
          cp "${RUNNER_TEMP}/template-source/GitPush.bat" GitPush.bat
          cp "${RUNNER_TEMP}/template-source/.github/workflows/sync-template-files.yml" .github/workflows/sync-template-files.yml

      - name: 檢查是否有變更
        id: diff
        run: |
          if git diff --quiet -- docs GitPush.bat .github/workflows/sync-template-files.yml; then
            echo "has_changes=false" >> "${GITHUB_OUTPUT}"
            echo "[略過] 沒有需要同步的變更"
          else
            echo "has_changes=true" >> "${GITHUB_OUTPUT}"
            echo "[成功] 偵測到需要提交的同步變更"
          fi

      - name: 提交並推送同步結果
        if: steps.diff.outputs.has_changes == 'true'
        run: |
          git add docs GitPush.bat .github/workflows/sync-template-files.yml
          git commit -m "[自動同步] 更新模板文件"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin HEAD:"${GITHUB_REF_NAME}"
